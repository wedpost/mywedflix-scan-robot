name: face-scan
on:
  schedule:
    - cron: '9,39 * * * *'
  workflow_dispatch: {}

concurrency:
  group: face-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache InsightFace model
        uses: actions/cache@v4
        with:
          path: ~/.insightface
          key: insightface-buffalo_s-v1
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Scan faces
        run: python scan.py
        env:
          MW_BASE: https://mywedflix.com
          MW_TOKEN: ${{ secrets.MW_TOKEN }}
